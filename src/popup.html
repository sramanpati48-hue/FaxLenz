<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FactLens</title>
    <link rel="stylesheet" href="src/popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>FactLens</h1>
      <label class="switch">
        <input id="toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
      <div class="status">Extension: <span id="statusText">Unknown</span></div>

      <h2>Session Stats</h2>
      <ul class="stats">
        <li>Verified: <span id="verified">0</span></li>
        <li>Misleading: <span id="misleading">0</span></li>
        <li>Disputed: <span id="disputed">0</span></li>
      </ul>
      <div class="actions">
        <button id="reset">Reset Stats</button>
      </div>
    </div>
    <script src="src/popup.js"></script>
  </body>
</html>
