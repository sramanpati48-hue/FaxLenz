<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FactLens</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup">
      <h1>FactLens</h1>
      <div class="row">
        <label>Enable</label>
        <input id="toggle" type="checkbox" />
      </div>
      <div class="status">Status: <span id="statusText">...</span></div>
      <h2>Session stats</h2>
      <ul>
        <li>Verified: <span id="verified">0</span></li>
        <li>Misleading: <span id="misleading">0</span></li>
        <li>Disputed: <span id="disputed">0</span></li>
        <li>Avg confidence: <span id="avgConfidence">0%</span></li>
      </ul>
      <button id="reset">Reset</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
